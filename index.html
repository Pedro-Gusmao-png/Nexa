<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <meta name="description" content="Convite digital para evento exclusivo.">

  <title>NEXA</title>

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

  <link rel="stylesheet" href="style.css">
</head>
<body>

<main class="container fade">

  <section class="card">

    <div class="card-image">
      <img src="img/fotofst2.jpg" alt="Evento">
      <div class="image-overlay"></div>
    </div>

    <div class="card-content">

      <h1 class="event-name">Festa Premium 2026</h1>

      <p class="event-subtitle">
        Uma noite exclusiva com música, drinks e experiências únicas.
      </p>

      <p class="event-info">
        <i class="fa-regular fa-calendar"></i>
        27 de abril • 19:30
      </p>

      <div 
        class="countdown"
        id="countdown"
        data-dia="10"
        data-mes="05"
        data-ano="2026"
        data-hora="19"
        data-minuto="30">
      </div>

      <div class="divider"></div>

      <div class="actions">

        <a href="#" id="btnMapa" class="btn">
          <i class="fas fa-location-dot"></i>
          Ver localização
        </a>

        <a href="#" id="btnWhats" class="btn whatsapp">
          <i class="fab fa-whatsapp"></i>
          Confirmar presença
        </a>

      </div>

    </div>

  </section>

</main>

<script src="script.js"></script>
</body>
</html>
